<section class="settings-page">
  <header class="settings-header">
    <div>
      <h1>Proje Ayarları</h1>
      <p>RAG asistanının çalışma modu, AI yapılandırması, doküman işleme ve veritabanı özeti.</p>
    </div>
  </header>

  <section class="settings-grid">
    @for (card of settingsCards; track card.title) {
      <article class="surface settings-card">
        <div class="card-heading">
          <span class="card-icon"><mat-icon>{{ card.icon }}</mat-icon></span>
          <div>
            <h2>{{ card.title }}</h2>
            <p>{{ card.description }}</p>
          </div>
        </div>

        <dl>
          @for (item of card.items; track item.label) {
            <dt>{{ item.label }}</dt>
            <dd>{{ item.value }}</dd>
          }
        </dl>
      </article>
    }
  </section>
</section>
