<mat-sidenav-container class="shell">
  <mat-sidenav class="sidebar" mode="side" opened>
    <div class="brand">
      <span class="brand-mark">CK</span>
      <div>
        <div class="brand-title">Company Knowledge</div>
        <div class="brand-subtitle">RAG Assistant</div>
      </div>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <div>
        <div class="topbar-title">Self-hosted RAG Demo</div>
        <div class="topbar-subtitle">Ollama, PostgreSQL pgvector, .NET API</div>
      </div>
      <span class="topbar-spacer"></span>
      <a mat-stroked-button href="http://localhost:8080/scalar/v1" target="_blank" rel="noreferrer">
        <mat-icon>api</mat-icon>
        Scalar
      </a>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
