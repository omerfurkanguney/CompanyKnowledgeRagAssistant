name: Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image names
        id: images
        shell: bash
        run: |
          repository_lc="${GITHUB_REPOSITORY,,}"
          echo "api=ghcr.io/${repository_lc}/company-knowledge-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${repository_lc}/company-knowledge-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./CompanyKnowledgeApi
          file: ./CompanyKnowledgeApi/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api }}:latest
            ${{ steps.images.outputs.api }}:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./CompanyKnowledgeWeb
          file: ./CompanyKnowledgeWeb/Dockerfile.production
          push: true
          tags: |
            ${{ steps.images.outputs.web }}:latest
            ${{ steps.images.outputs.web }}:${{ github.sha }}
