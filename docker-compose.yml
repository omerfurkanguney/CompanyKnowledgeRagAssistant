services:
  api:
    build:
      context: ./CompanyKnowledgeApi
      dockerfile: Dockerfile
    container_name: company-knowledge-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama

  postgres:
    image: pgvector/pgvector:pg17
    container_name: company-knowledge-postgres
    environment:
      POSTGRES_DB: company_knowledge
      POSTGRES_USER: company_knowledge
      POSTGRES_PASSWORD: company_knowledge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: company-knowledge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
